<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>研学足迹</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
            background: #f5f7fa;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .app-container {
            width: 100%;
            max-width: 430px;
            background: #fff;
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        /* ===== 顶部导航 ===== */
        .top-nav {
            height: 50px;
            background: #fff;
            display: flex;
            align-items: center;
            padding: 0 16px;
            border-bottom: 1px solid #f0f0f0;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .back-btn {
            width: 32px; height: 32px;
            border-radius: 50%; border: none;
            background: #f5f5f5;
            font-size: 18px; color: #666;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .back-btn:active { background: #e8e8e8; }
        .top-nav-title {
            flex: 1; text-align: center;
            font-size: 17px; font-weight: 600; color: #333;
            padding-right: 32px;
        }

        /* ===== 用户信息卡片 ===== */
        .user-card {
            background: linear-gradient(135deg, #0669FF, #004FE0);
            padding: 20px 16px;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .user-avatar {
            width: 48px; height: 48px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }
        .user-info-text { flex: 1; color: #fff; }
        .user-info-text .u-name { font-size: 18px; font-weight: 700; }
        .user-info-text .u-sub { font-size: 12px; opacity: 0.75; margin-top: 2px; }
        .user-info-text .u-count { font-size: 12px; opacity: 0.65; margin-top: 2px; }

        /* ===== 足迹标题 ===== */
        .track-title {
            padding: 20px 16px 10px;
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }
        .track-title span { font-size: 13px; font-weight: 400; color: #999; margin-left: 6px; }

        /* ===== 足迹时间线 ===== */
        .track-timeline {
            padding: 0 16px 30px;
            position: relative;
        }
        .track-timeline::before {
            content: '';
            position: absolute;
            left: 32px;
            top: 0;
            bottom: 0;
            width: 3px;
            background: linear-gradient(to bottom, #0669FF, #4A9EFF, #c0d8ff);
            border-radius: 2px;
        }

        .track-node {
            display: flex;
            gap: 16px;
            padding-bottom: 36px;
            position: relative;
            cursor: pointer;
            animation: nodeIn 0.6s ease-out both;
        }
        .track-node:nth-child(1) { animation-delay: 0.1s; }
        .track-node:nth-child(2) { animation-delay: 0.3s; }
        .track-node:nth-child(3) { animation-delay: 0.5s; }

        @keyframes nodeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .track-dot {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #0669FF;
            border: 3px solid #fff;
            box-shadow: 0 0 0 2px #0669FF, 0 2px 8px rgba(6,105,255,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #fff;
            flex-shrink: 0;
            z-index: 2;
            position: relative;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .track-node:hover .track-dot {
            transform: scale(1.15);
            box-shadow: 0 0 0 3px #0669FF, 0 4px 16px rgba(6,105,255,0.4);
        }

        /* 脉冲动画 */
        .track-dot::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid rgba(6,105,255,0.4);
            animation: pulse 2s ease-out infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.8); opacity: 0; }
        }

        .track-card {
            flex: 1;
            background: #f8f9fc;
            border-radius: 14px;
            padding: 14px 16px;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }
        .track-node:hover .track-card {
            transform: translateX(3px);
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .track-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: #0669FF;
            border-radius: 0 2px 2px 0;
        }
        .track-card .course-name {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .track-card .course-date {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }
        .track-card .click-hint {
            font-size: 11px;
            color: #E65100;
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: 500;
        }

        .bottom-spacer { height: 20px; }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 顶部导航 -->
        <div class="top-nav">
            <button class="back-btn" onclick="goBack()">‹</button>
            <div class="top-nav-title">研学足迹</div>
        </div>

        <!-- 用户信息卡片 -->
        <div class="user-card">
            <div class="user-avatar">👩</div>
            <div class="user-info-text">
                <div class="u-name" id="userName">杨梅</div>
                <div class="u-sub">已参与 3 个研学课程</div>
                <div class="u-count">加入时间：2025.03.15</div>
            </div>
        </div>

        <!-- 足迹标题 -->
        <div class="track-title">
            🏆 研学足迹 <span>共3个足迹</span>
        </div>

        <!-- 足迹时间线 -->
        <div class="track-timeline">
            <div class="track-node" onclick="goReport()">
                <div class="track-dot">🏚️</div>
                <div class="track-card">
                    <div class="course-name">我为杜甫建茅屋</div>
                    <div class="course-date">📅 2026.5.28</div>
                    <div class="click-hint">📄 查看研学报告 ›</div>
                </div>
            </div>
            <div class="track-node" onclick="goReport()">
                <div class="track-dot">🏯</div>
                <div class="track-card">
                    <div class="course-name">诗境无界·草堂寻心</div>
                    <div class="course-date">📅 2026.1.15</div>
                    <div class="click-hint">📄 查看研学报告 ›</div>
                </div>
            </div>
            <div class="track-node" onclick="goReport()">
                <div class="track-dot">🌿</div>
                <div class="track-card">
                    <div class="course-name">盆景美学·指尖上的山水</div>
                    <div class="course-date">📅 2025.12.20</div>
                    <div class="click-hint">📄 查看研学报告 ›</div>
                </div>
            </div>
        </div>

        <div class="bottom-spacer"></div>
    </div>

    <script>
        function goBack() {
            window.location.href = '我的游客.html';
        }

        function goReport() {
            window.location.href = '研学报告.html';
        }
    </script>
</body>
</html>
