<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>离泰数链</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
            background: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .app-container {
            width: 100%;
            max-width: 430px;
            background: #fff;
            border-radius: 20px;
            padding: 40px 24px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
            text-align: center;
        }
        .logo {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .app-name {
            font-size: 22px;
            font-weight: 700;
            color: #333;
            margin-bottom: 4px;
        }
        .app-desc {
            font-size: 14px;
            color: #999;
            margin-bottom: 32px;
        }
        .menu-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .menu-card {
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 20px;
            border-radius: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
        }
        .menu-card:active {
            transform: scale(0.97);
        }
        .menu-card.blue {
            background: linear-gradient(135deg, #0669FF, #004FE0);
            box-shadow: 0 4px 16px rgba(6,105,255,0.3);
        }
        .menu-card.orange {
            background: linear-gradient(135deg, #E65100, #BF360C);
            box-shadow: 0 4px 16px rgba(230,81,0,0.3);
        }
        .menu-icon {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
        }
        .menu-text {
            flex: 1;
            text-align: left;
            color: #fff;
        }
        .menu-text .mt-title {
            font-size: 17px;
            font-weight: 600;
        }
        .menu-text .mt-desc {
            font-size: 13px;
            opacity: 0.8;
            margin-top: 2px;
        }
        .menu-arrow {
            font-size: 22px;
            color: rgba(255,255,255,0.6);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="logo">🏚️</div>
        <div class="app-name">离泰数链</div>
        <div class="app-desc">研学实践 · 文化传承</div>

        <div class="menu-grid">
            <a class="menu-card blue" href="研学日历.html">
                <div class="menu-icon">📅</div>
                <div class="menu-text">
                    <div class="mt-title">小程序用户端</div>
                    <div class="mt-desc">研学日历 · 课程查看</div>
                </div>
                <div class="menu-arrow">›</div>
            </a>

            <a class="menu-card orange" href="订单详情.html">
                <div class="menu-icon">📋</div>
                <div class="menu-text">
                    <div class="mt-title">小程序机构端</div>
                    <div class="mt-desc">订单详情与核销管理</div>
                </div>
                <div class="menu-arrow">›</div>
            </a>

            <a class="menu-card" style="background:linear-gradient(135deg,#00897B,#00695C);box-shadow:0 4px 16px rgba(0,137,123,0.3);" href="课程管理.html">
                <div class="menu-icon">📚</div>
                <div class="menu-text">
                    <div class="mt-title">课程管理</div>
                    <div class="mt-desc">产品管理 · 上下架与评价</div>
                </div>
                <div class="menu-arrow">›</div>
            </a>

            <a class="menu-card" style="background:linear-gradient(135deg,#7B1FA2,#4A148C);box-shadow:0 4px 16px rgba(123,31,162,0.3);" href="系统参数配置.html">
                <div class="menu-icon">⚙️</div>
                <div class="menu-text">
                    <div class="mt-title">系统参数配置</div>
                    <div class="mt-desc">AI生成配置 · 系统Prompt</div>
                </div>
                <div class="menu-arrow">›</div>
            </a>
        </div>
    </div>
</body>
</html>
