<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>生成研学报告</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
            background: #f5f7fa;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .app-container {
            width: 100%;
            max-width: 430px;
            background: #fff;
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        /* ===== 顶部导航 ===== */
        .top-nav {
            height: 50px;
            background: #fff;
            display: flex;
            align-items: center;
            padding: 0 16px;
            border-bottom: 1px solid #f0f0f0;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .back-btn {
            width: 32px; height: 32px;
            border-radius: 50%; border: none;
            background: #f5f5f5;
            font-size: 18px; color: #666;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .back-btn:active { background: #e8e8e8; }
        .top-nav-title {
            flex: 1; text-align: center;
            font-size: 17px; font-weight: 600; color: #333;
            padding-right: 32px;
        }

        /* ===== 课程信息条 ===== */
        .course-bar {
            padding: 14px 16px;
            background: linear-gradient(135deg, #E8C87A, #D4A84B);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .course-bar .cb-icon { font-size: 24px; }
        .course-bar .cb-text { font-size: 14px; font-weight: 600; color: #5C3D1A; }

        /* ===== 提示区域 ===== */
        .tip-area {
            padding: 16px 16px 0;
        }
        .tip-area .tip-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }
        .tip-area .tip-desc {
            font-size: 13px;
            color: #888;
            margin-top: 4px;
        }

        /* ===== 关键词输入框 ===== */
        .keyword-box {
            margin: 12px 16px 0;
        }
        .keyword-box textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            color: #333;
            resize: none;
            outline: none;
            font-family: inherit;
            line-height: 1.7;
            min-height: 100px;
            transition: border-color 0.2s;
        }
        .keyword-box textarea:focus {
            border-color: #0669FF;
        }
        .keyword-box textarea::placeholder { color: #bbb; }

        /* ===== 快捷标签 ===== */
        .quick-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 10px 16px 14px;
        }
        .quick-tag {
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid #e0e0e0;
            background: #fff;
            font-size: 12px;
            color: #666;
            cursor: pointer;
            transition: all 0.2s;
        }
        .quick-tag:active {
            background: #E8F1FF;
            border-color: #0669FF;
            color: #0669FF;
        }

        /* ===== 生成按钮 ===== */
        .gen-btn-wrap {
            padding: 4px 16px 16px;
        }
        .gen-btn {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 10px;
            background: #0669FF;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .gen-btn:active { opacity: 0.8; }
        .gen-btn:disabled { opacity: 0.5; cursor: default; }

        /* ===== 生成进度 ===== */
        .progress-bar-wrap {
            display: none;
            margin: 16px 16px 0;
            padding: 14px 16px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .progress-bar-wrap.show { display: block; }
        .progress-bar-wrap .pb-text {
            font-size: 13px; color: #888;
            margin-bottom: 8px; text-align: center;
        }
        .progress-track {
            width: 100%; height: 6px;
            background: #f0f0f0;
            border-radius: 3px; overflow: hidden;
        }
        .progress-fill {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, #0669FF, #4A9EFF);
            border-radius: 3px;
            transition: width 0.3s;
        }

        /* ===== 报告结果 ===== */
        .report-area {
            display: none;
            margin: 16px 16px 0;
            flex-direction: column;
            gap: 12px;
        }
        .report-area.show { display: flex; }

        .report-card {
            background: #f8f9fc;
            border-radius: 14px;
            padding: 18px;
        }
        .report-card .rc-label {
            font-size: 13px;
            font-weight: 600;
            color: #0669FF;
            margin-bottom: 8px;
        }
        .report-card .rc-content {
            font-size: 14px;
            color: #444;
            line-height: 1.8;
            white-space: pre-wrap;
        }
        .report-card .rc-content[contenteditable="true"] {
            background: #fff;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            outline: none;
        }
        .report-card .rc-content[contenteditable="true"]:focus {
            border-color: #0669FF;
        }

        /* ===== 底部操作 ===== */
        .bottom-actions {
            padding: 12px 16px 30px;
        }
        .bottom-actions .save-btn {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 10px;
            background: #D4A84B;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .bottom-actions .save-btn:active { opacity: 0.8; }
        .bottom-actions .save-btn:disabled { opacity: 0.5; cursor: default; }

        .bottom-actions .regen-btn {
            width: 100%;
            padding: 12px;
            border: 1px solid #0669FF;
            border-radius: 10px;
            background: #fff;
            color: #0669FF;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.2s;
        }
        .bottom-actions .regen-btn:active { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 顶部导航 -->
        <div class="top-nav">
            <button class="back-btn" onclick="goBack()">‹</button>
            <div class="top-nav-title" id="pageTitle">生成研学报告</div>
        </div>

        <!-- 课程信息 -->
        <div class="course-bar">
            <span class="cb-icon">🏚️</span>
            <span class="cb-text">我为杜甫建茅屋</span>
        </div>

        <!-- 提示区域 -->
        <div class="tip-area" id="tipArea">
            <div class="tip-title">📝 输入报告关键词</div>
            <div class="tip-desc">输入你想在报告中体现的重点内容，或从下方快捷词中选择</div>
        </div>

        <!-- 关键词输入 -->
        <div class="keyword-box">
            <textarea id="keywordInput" rows="4" placeholder="请输入报告关键词，如：茅屋搭建过程、团队协作、知识收获..."></textarea>
        </div>

        <!-- 快捷标签 -->
        <div class="quick-tags" id="quickTags">
            <span class="quick-tag" onclick="addTag(this)">茅屋搭建过程</span>
            <span class="quick-tag" onclick="addTag(this)">团队协作</span>
            <span class="quick-tag" onclick="addTag(this)">知识收获</span>
            <span class="quick-tag" onclick="addTag(this)">动手能力</span>
            <span class="quick-tag" onclick="addTag(this)">历史文化</span>
            <span class="quick-tag" onclick="addTag(this)">创新思维</span>
        </div>

        <!-- 进度条 - 第一阶段 -->
        <div class="progress-bar-wrap" id="progressWrap1">
            <div class="pb-text" id="progressText1">⏳ AI正在生成"今日研学内容"...</div>
            <div class="progress-track">
                <div class="progress-fill" id="progressFill1"></div>
            </div>
        </div>

        <!-- 进度条 - 第二阶段 -->
        <div class="progress-bar-wrap" id="progressWrap2">
            <div class="pb-text" id="progressText2">⏳ AI正在生成"今日研学评价"...</div>
            <div class="progress-track">
                <div class="progress-fill" id="progressFill2"></div>
            </div>
        </div>

        <!-- 报告结果 -->
        <div class="report-area" id="reportArea">
            <div class="report-card">
                <div class="rc-label">📖 今日研学内容（可点击修改）</div>
                <div class="rc-content" id="reportContent1" contenteditable="true"></div>
            </div>
            <div class="report-card">
                <div class="rc-label">⭐ 今日研学评价（可点击修改）</div>
                <div class="rc-content" id="reportContent2" contenteditable="true"></div>
            </div>
        </div>

        <!-- 底部操作 -->
        <div class="bottom-actions" id="bottomActions">
            <button class="gen-btn" id="genBtn" onclick="startGenerate()">✨ 立即生成</button>
            <div id="savedActions" style="display:none;">
                <button class="save-btn" onclick="saveReport()">💾 保存报告</button>
                <button class="regen-btn" onclick="reGenerate()">🔄 再次生成</button>
            </div>
        </div>
    </div>

    <script>
        var genTimer1 = null;
        var genTimer2 = null;

        function goBack() {
            window.location.href = '管理后台-订单详情.html';
        }

        // 检查是否已有保存的报告
        var savedReport = localStorage.getItem('studyReport');
        var isViewMode = savedReport && new URLSearchParams(window.location.search).get('view') === '1';

        if (isViewMode) {
            document.getElementById('pageTitle').textContent = '查看研学报告';
            document.getElementById('tipArea').style.display = 'none';
            document.querySelector('.keyword-box').style.display = 'none';
            document.querySelector('.quick-tags').style.display = 'none';
            document.getElementById('genBtn').style.display = 'none';
            document.getElementById('progressWrap1').style.display = 'none';
            document.getElementById('progressWrap2').style.display = 'none';

            try {
                var data = JSON.parse(savedReport);
                document.getElementById('reportContent1').textContent = data.content1 || '';
                document.getElementById('reportContent2').textContent = data.content2 || '';
            } catch(e) {
                document.getElementById('reportContent1').textContent = savedReport;
                document.getElementById('reportContent2').textContent = '';
            }
            document.getElementById('reportArea').classList.add('show');
            document.getElementById('savedActions').style.display = 'block';
        }

        function addTag(el) {
            var input = document.getElementById('keywordInput');
            var text = el.textContent;
            var current = input.value.trim();
            if (current) {
                input.value = current + '、' + text;
            } else {
                input.value = text;
            }
        }

        function startGenerate() {
            var btn = document.getElementById('genBtn');
            btn.disabled = true;
            btn.textContent = '⏳ 生成中...';

            document.getElementById('reportArea').classList.remove('show');
            document.getElementById('savedActions').style.display = 'none';
            document.getElementById('progressWrap1').classList.remove('show');
            document.getElementById('progressWrap2').classList.remove('show');

            var keywords = document.getElementById('keywordInput').value.trim() || '课程学习';
            var kws = keywords.split(/[、，,]/).filter(function(k) { return k.trim(); });

            // ---- 第一阶段：生成今日研学内容 ----
            var wrap1 = document.getElementById('progressWrap1');
            var fill1 = document.getElementById('progressFill1');
            wrap1.classList.add('show');
            fill1.style.width = '0%';

            var p1 = 0;
            var interval1 = setInterval(function() {
                p1 += Math.random() * 15 + 5;
                if (p1 > 95) p1 = 95;
                fill1.style.width = p1 + '%';
            }, 350);

            genTimer1 = setTimeout(function() {
                clearInterval(interval1);
                fill1.style.width = '100%';
                setTimeout(function() {
                    wrap1.classList.remove('show');
                    document.getElementById('reportContent1').textContent = generateContentPart(keywords, kws);
                    document.getElementById('reportArea').classList.add('show');
                    genTimer1 = null;

                    // ---- 第二阶段：生成今日研学评价 ----
                    var wrap2 = document.getElementById('progressWrap2');
                    var fill2 = document.getElementById('progressFill2');
                    wrap2.classList.add('show');
                    fill2.style.width = '0%';

                    var p2 = 0;
                    var interval2 = setInterval(function() {
                        p2 += Math.random() * 15 + 5;
                        if (p2 > 95) p2 = 95;
                        fill2.style.width = p2 + '%';
                    }, 350);

                    genTimer2 = setTimeout(function() {
                        clearInterval(interval2);
                        fill2.style.width = '100%';
                        setTimeout(function() {
                            wrap2.classList.remove('show');
                            document.getElementById('reportContent2').textContent = generateEvalPart(keywords, kws);

                            btn.disabled = false;
                            btn.textContent = '✨ 立即生成';
                            btn.style.display = 'none';
                            document.getElementById('savedActions').style.display = 'block';
                            genTimer2 = null;
                        }, 300);
                    }, 2000);
                }, 300);
            }, 2000);
        }

        function generateContentPart(keywords, kws) {
            var content = '课程名称：我为杜甫建茅屋\n';
            content += '课程时间：2026年5月28日 14:00-17:00\n\n';
            content += '本次课程以杜甫草堂为背景，通过探访诗圣故居、学习传统茅屋搭建技艺，';
            content += '让学生深入了解唐代建筑文化与杜甫的家国情怀。\n\n';
            kws.forEach(function(k, i) {
                content += '▸ ';
                if (k.indexOf('茅屋') !== -1) content += k.trim() + '：学习了传统茅屋的搭建结构、材料选择及力学原理，分组协作亲手搭建茅屋模型。';
                else if (k.indexOf('团队') !== -1) content += k.trim() + '：分组协作完成搭建任务，成员分工明确，配合默契，增强了团队意识。';
                else if (k.indexOf('知识') !== -1 || k.indexOf('收获') !== -1) content += k.trim() + '：了解了杜甫在成都的生活与创作背景，感受诗圣的家国情怀。';
                else if (k.indexOf('动手') !== -1) content += k.trim() + '：在搭建过程中反复调整结构，锻炼了手眼协调和实际操作能力。';
                else if (k.indexOf('历史') !== -1 || k.indexOf('文化') !== -1) content += k.trim() + '：深入了解了唐代建筑风格与杜甫诗歌的深厚文化底蕴。';
                else if (k.indexOf('创新') !== -1 || k.indexOf('思维') !== -1) content += k.trim() + '：在传统茅屋结构基础上，思考如何优化设计，培养了创新意识。';
                else content += k.trim() + '：作为本次研学的重要环节，深入参与并获得了丰富体验。';
                content += '\n';
            });
            return content;
        }

        function generateEvalPart(keywords, kws) {
            var content = '';
            var hasTeamwork = kws.some(function(k) { return k.indexOf('团队') !== -1; });
            var hasHandsOn = kws.some(function(k) { return k.indexOf('动手') !== -1 || k.indexOf('茅屋') !== -1; });
            var hasKnowledge = kws.some(function(k) { return k.indexOf('知识') !== -1 || k.indexOf('历史') !== -1 || k.indexOf('文化') !== -1; });
            var hasCreative = kws.some(function(k) { return k.indexOf('创新') !== -1 || k.indexOf('思维') !== -1; });

            if (hasTeamwork) content += '在团队协作方面表现出色，主动帮助其他组员调整结构，分工明确，配合默契。\n';
            if (hasHandsOn) content += '动手能力很强，在模型搭建中反复尝试优化结构，体现了优秀的实际操作能力。\n';
            if (hasKnowledge) content += '对课程所涉及的历史文化知识理解深刻，能够将所学内容与实践活动相结合。\n';
            if (hasCreative) content += '在传统茅屋结构基础上提出了创新想法，展现了良好的创新思维能力。\n';

            if (!content) {
                content += '在搭建茅屋时非常专注，主动帮助其他组员调整结构，展现了很好的团队协作精神。\n';
                content += '对茅屋的力学原理理解到位，体现了优秀的动手能力和探索精神。\n';
            }

            content += '课程参与度高，积极回答问题，与老师和同学互动良好，整体表现优异。';
            return content;
        }

        function saveReport() {
            var c1 = document.getElementById('reportContent1').textContent;
            var c2 = document.getElementById('reportContent2').textContent;
            var data = JSON.stringify({ content1: c1, content2: c2 });
            localStorage.setItem('studyReport', data);
            alert('✅ 报告已保存！');
            document.getElementById('savedActions').style.display = 'none';
            document.getElementById('genBtn').style.display = 'block';
            document.getElementById('pageTitle').textContent = '生成研学报告';
            document.getElementById('tipArea').style.display = 'block';
            document.querySelector('.keyword-box').style.display = 'block';
            document.querySelector('.quick-tags').style.display = 'flex';
            document.getElementById('reportArea').classList.remove('show');
            document.getElementById('keywordInput').value = '';
        }

        function reGenerate() {
            document.getElementById('savedActions').style.display = 'none';
            document.getElementById('genBtn').style.display = 'block';
            document.getElementById('reportArea').classList.remove('show');
            document.getElementById('progressWrap1').classList.remove('show');
            document.getElementById('progressWrap2').classList.remove('show');
            document.getElementById('pageTitle').textContent = '生成研学报告';
            document.getElementById('tipArea').style.display = 'block';
            document.querySelector('.keyword-box').style.display = 'block';
            document.querySelector('.quick-tags').style.display = 'flex';
            document.getElementById('keywordInput').value = '';
            if (genTimer1) { clearTimeout(genTimer1); genTimer1 = null; }
            if (genTimer2) { clearTimeout(genTimer2); genTimer2 = null; }
        }
    </script>
<a href="AI创作和研学报告.html" style="position:fixed;top:12px;right:16px;z-index:99999;background:#E53935;color:#fff;padding:7px 16px;border-radius:20px;text-decoration:none;font-size:13px;font-weight:600;box-shadow:0 2px 10px rgba(229,57,53,0.4);display:inline-flex;align-items:center;gap:5px;">🏠 首页</a>
</body>
</html>
