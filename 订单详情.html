<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>订单详情 - 管理后台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .app-container {
            width: 100%;
            max-width: 430px;
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            background: #f5f5f5;
        }

        /* ===== 状态栏 ===== */
        .status-bar {
            height: 44px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 0 16px;
        }
        .status-bar .time {
            position: absolute;
            left: 20px;
            font-size: 15px;
            font-weight: 600;
            color: #333;
        }
        .status-bar .icons {
            position: absolute;
            right: 16px;
            display: flex;
            gap: 4px;
            align-items: center;
        }
        .status-bar .icons span {
            font-size: 14px;
        }

        /* ===== 顶部导航 ===== */
        .top-nav {
            height: 50px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            position: relative;
        }
        .top-nav .back-btn {
            font-size: 24px;
            color: #333;
            cursor: pointer;
        }
        .top-nav .title {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }
        .top-nav .right-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .top-nav .right-actions span {
            font-size: 20px;
            color: #333;
            cursor: pointer;
        }

        /* ===== 内容区域 ===== */
        .content {
            padding: 12px 16px 100px;
        }

        /* ===== 日期和状态 ===== */
        .date-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .date-header .date {
            font-size: 16px;
            font-weight: 600;
            color: #8B4513;
        }
        .date-header .status-tag {
            background: #E8F5E9;
            color: #4CAF50;
            font-size: 12px;
            padding: 3px 10px;
            border-radius: 4px;
            font-weight: 500;
        }

        /* ===== 课程信息卡片 ===== */
        .course-card {
            background: #fff;
            border-radius: 12px;
            padding: 16px;
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }
        .course-card .course-img {
            width: 90px;
            height: 70px;
            border-radius: 8px;
            overflow: hidden;
            flex-shrink: 0;
        }
        .course-card .course-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .course-card .course-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .course-card .course-info .name {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }
        .course-card .course-info .session {
            font-size: 13px;
            color: #888;
            margin-top: 4px;
        }
        .course-card .course-info .order-count {
            font-size: 13px;
            color: #666;
            margin-top: 2px;
        }

        /* ===== 联系人信息组 ===== */
        .contact-group {
            background: #fff;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }
        .contact-group .group-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 14px;
            border-bottom: 1px solid #f0f0f0;
            margin-bottom: 14px;
        }
        .contact-group .group-header .phone-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .contact-group .group-header .phone-wrap .label {
            font-size: 14px;
            color: #666;
        }
        .contact-group .group-header .phone-wrap .phone {
            font-size: 15px;
            font-weight: 500;
            color: #333;
        }
        .contact-group .group-header .phone-wrap .phone-icon {
            width: 32px;
            height: 32px;
            background: #FFF3E0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #E65100;
            margin-left: 4px;
            cursor: pointer;
        }
        .contact-group .group-header .status-badge {
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 4px;
            font-weight: 500;
        }
        .contact-group .group-header .status-badge.pending {
            background: #E8F5E9;
            color: #4CAF50;
        }
        .contact-group .group-header .status-badge.confirmed {
            background: #4CAF50;
            color: #fff;
        }

        .contact-list {
            display: flex;
            flex-direction: column;
        }
        .contact-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px dashed #eee;
        }
        .contact-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }
        .contact-item:first-child {
            padding-top: 0;
        }
        .contact-item .name {
            font-size: 15px;
            color: #333;
            font-weight: 500;
        }
        .contact-item .id-card {
            font-size: 13px;
            color: #999;
        }
        .contact-item .eval-btn {
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 6px;
            border: none;
            font-weight: 500;
            cursor: pointer;
            flex-shrink: 0;
            transition: opacity 0.2s;
        }
        .contact-item .eval-btn:active { opacity: 0.8; }
        .eval-btn-add {
            background: #0669FF;
            color: #fff;
        }
        .eval-btn-view {
            background: #4CAF50;
            color: #fff;
        }

        /* ===== 底部按钮区域 ===== */
        .bottom-actions {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 430px;
            background: #fff;
            padding: 12px 16px 24px;
            border-top: 1px solid #f0f0f0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .btn-outline {
            width: 100%;
            padding: 14px;
            border: 1px solid #8B4513;
            border-radius: 8px;
            background: #fff;
            color: #8B4513;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }
        .btn-outline:active {
            background: #FFF8E1;
        }
        .btn-outline .arrow-icon {
            width: 28px;
            height: 28px;
            background: #8B4513;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 12px;
        }
        .btn-primary {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #0669FF, #004FE0);
            color: #fff;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-primary:active { opacity: 0.85; }
        .btn-view {
            background: linear-gradient(135deg, #4CAF50, #388E3C);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 状态栏 -->
        <div class="status-bar">
            <span class="time">9:41</span>
            <div class="icons">
                <span>📶</span>
                <span>📡</span>
                <span>🔋</span>
            </div>
        </div>

        <!-- 顶部导航 -->
        <div class="top-nav">
            <span class="back-btn">‹</span>
            <span class="title">详情</span>
            <div class="right-actions">
                <span>•••</span>
                <span>👁</span>
            </div>
        </div>

        <!-- 内容区域 -->
        <div class="content">
            <!-- 日期和状态 -->
            <div class="date-header">
                <span class="date">2025-08-14</span>
                <span class="status-tag">待出行</span>
            </div>

            <!-- 课程信息卡片 -->
            <div class="course-card">
                <div class="course-img">
                    <img src="https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=200&h=150&fit=crop" alt="课程封面">
                </div>
                <div class="course-info">
                    <div>
                        <div class="name">杜甫和李白的故事</div>
                        <div class="session">场次：13:00-15:00</div>
                    </div>
                    <div class="order-count">11单</div>
                </div>
            </div>

            <!-- 第一组联系人 - 待出行 -->
            <div class="contact-group">
                <div class="group-header">
                    <div class="phone-wrap">
                        <span class="label">联系电话</span>
                        <span class="phone">13800138001</span>
                        <span class="phone-icon">📞</span>
                    </div>
                    <span class="status-badge pending">待出行</span>
                </div>
                <div class="contact-list">
                    <div class="contact-item">
                        <span class="name">赵小明</span>
                        <span class="id-card">511602************38</span>
                        <button class="eval-btn eval-btn-add" onclick="goEval('赵小明')">评价</button>
                    </div>
                    <div class="contact-item">
                        <span class="name">李小红</span>
                        <span class="id-card">510108************25</span>
                        <button class="eval-btn eval-btn-add" onclick="goEval('李小红')">评价</button>
                    </div>
                    <div class="contact-item">
                        <span class="name">王大力</span>
                        <span class="id-card">440305************12</span>
                        <button class="eval-btn eval-btn-add" onclick="goEval('王大力')">评价</button>
                    </div>
                </div>
            </div>

            <!-- 第二组联系人 - 已核销 -->
            <div class="contact-group">
                <div class="group-header">
                    <div class="phone-wrap">
                        <span class="label">联系电话</span>
                        <span class="phone">13900139002</span>
                        <span class="phone-icon">📞</span>
                    </div>
                    <span class="status-badge confirmed">已核销</span>
                </div>
                <div class="contact-list">
                    <div class="contact-item">
                        <span class="name">陈小华</span>
                        <span class="id-card">330102************45</span>
                        <button class="eval-btn eval-btn-add" onclick="goEval('陈小华')">评价</button>
                    </div>
                    <div class="contact-item">
                        <span class="name">林小芳</span>
                        <span class="id-card">350103************67</span>
                        <button class="eval-btn eval-btn-add" onclick="goEval('林小芳')">评价</button>
                    </div>
                    <div class="contact-item">
                        <span class="name">黄小军</span>
                        <span class="id-card">420106************89</span>
                        <button class="eval-btn eval-btn-add" onclick="goEval('黄小军')">评价</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 底部按钮 -->
        <div class="bottom-actions">
            <button class="btn-outline" onclick="confirmComplete()">
                <span class="arrow-icon">››</span>
                <span>确认完成</span>
            </button>
            <button class="btn-primary" id="infoBtn" onclick="handleInfo()">
                📋 生成研学信息
            </button>
        </div>
    </div>

    <script>
        function checkStatus() {
            var saved = localStorage.getItem('studyInfo');
            var btn = document.getElementById('infoBtn');
            if (saved) {
                btn.innerHTML = '📄 查看研学信息';
                btn.classList.add('btn-view');
            } else {
                btn.innerHTML = '📋 生成研学信息';
                btn.classList.remove('btn-view');
            }
            // 初始化评价按钮状态
            document.querySelectorAll('.contact-item').forEach(function(item) {
                var btn = item.querySelector('.eval-btn');
                var name = item.querySelector('.name').textContent.trim();
                var key = 'eval_' + name;
                if (localStorage.getItem(key)) {
                    btn.textContent = '查看评价';
                    btn.className = 'eval-btn eval-btn-view';
                }
            });
        }

        function confirmComplete() {
            alert('✅ 已确认完成订单');
        }

        function handleInfo() {
            var saved = localStorage.getItem('studyInfo');
            if (saved) {
                window.location.href = '生成研学信息.html?view=1';
            } else {
                window.location.href = '生成研学信息.html';
            }
        }

        function goEval(name) {
            var key = 'eval_' + name;
            var saved = localStorage.getItem(key);
            var params = '?name=' + encodeURIComponent(name) + '&course=' + encodeURIComponent('杜甫和李白的故事') + '&time=13:00-15:00';
            if (saved) {
                window.location.href = '研学评价.html' + params + '&view=1';
            } else {
                window.location.href = '研学评价.html' + params;
            }
        }

        checkStatus();
    </script>
<a href="AI创作和研学报告.html" style="position:fixed;top:12px;right:16px;z-index:99999;background:#E53935;color:#fff;padding:7px 16px;border-radius:20px;text-decoration:none;font-size:13px;font-weight:600;box-shadow:0 2px 10px rgba(229,57,53,0.4);display:inline-flex;align-items:center;gap:5px;">🏠 首页</a>
</body>
</html>
