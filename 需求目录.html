<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>需求目录 - 离泰数链</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, 'SF Pro Text', 'SF Pro Display', 'Helvetica Neue', 'PingFang SC', Arial, sans-serif;
            background: #f5f5f7;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 60px 24px 100px;
            -webkit-font-smoothing: antialiased;
        }
        .page-wrap {
            width: 100%;
            max-width: 680px;
        }
        .header-area {
            text-align: center;
            padding-bottom: 56px;
        }
        .header-area .app-name {
            font-size: 40px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #1d1d1f;
        }
        .header-area .app-desc {
            font-size: 17px;
            color: #86868b;
            margin-top: 6px;
            font-weight: 400;
        }

        .section {
            margin-bottom: 48px;
        }
        .section-header {
            display: flex;
            align-items: baseline;
            gap: 10px;
            padding-bottom: 14px;
            margin-bottom: 16px;
            border-bottom: 1px solid #d2d2d7;
        }
        .section-header .sh-label {
            font-size: 20px;
            font-weight: 600;
            color: #1d1d1f;
            letter-spacing: -0.2px;
        }
        .section-header .sh-badge {
            font-size: 12px;
            padding: 3px 12px;
            border-radius: 20px;
            font-weight: 500;
            margin-left: auto;
        }
        .section-header .sh-badge.green { background: #E8F5E9; color: #2E7D32; }
        .section-header .sh-badge.gray { background: #e8e8ed; color: #86868b; }

        .list { display: flex; flex-direction: column; gap: 8px; }
        .item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            background: #fff;
            border-radius: 14px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }
        .item:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .item:active { transform: scale(0.98); }
        .item .it-label {
            font-size: 15px;
            font-weight: 500;
            color: #1d1d1f;
            flex: 1;
        }
        .item .it-tag {
            font-size: 12px;
            padding: 3px 12px;
            border-radius: 20px;
            font-weight: 500;
            flex-shrink: 0;
        }
        .item .it-tag.green { background: #E8F5E9; color: #2E7D32; }
        .item .it-tag.gray { background: #f0f0f5; color: #86868b; }
        .item .it-arrow {
            font-size: 14px;
            color: #c7c7cc;
            flex-shrink: 0;
            font-weight: 300;
        }
        .item:hover .it-arrow { color: #0669FF; }

        .back-home {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: #fff;
            padding: 10px 28px;
            border-radius: 24px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.2px;
            transition: all 0.2s;
        }
        .back-home:hover { background: rgba(0,0,0,0.95); }
    </style>
</head>
<body>
<div class="page-wrap">
    <div class="header-area">
        <div class="app-name">需求目录</div>
        <div class="app-desc">离泰数链</div>
    </div>

    <div class="section">
        <div class="section-header">
            <span class="sh-label">AI创作和研学报告</span>
        </div>
        <div class="list">
            <a class="item" href="index.html">
                <span class="it-label">AI创作和研学报告</span>
                <span class="it-tag green">已完成</span>
            </a>
        </div>
    </div>

    <div class="section">
        <div class="section-header">
            <span class="sh-label">2026.7.7 迭代</span>
        </div>
        <div class="list">
            <div class="item" onclick="alert('商城积分 - 待开发')">
                <span class="it-label">商城积分</span>
                <span class="it-tag gray">待开发</span>
            </div>
            <div class="item" onclick="alert('Banner跳转 - 待开发')">
                <span class="it-label">Banner跳转</span>
                <span class="it-tag gray">待开发</span>
            </div>
            <div class="item" onclick="alert('客服分类 - 待开发')">
                <span class="it-label">客服分类</span>
                <span class="it-tag gray">待开发</span>
            </div>
        </div>
    </div>
</div>
</body>
</html>
