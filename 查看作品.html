<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>查看作品</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
            background: #f5f7fa;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .app-container {
            width: 100%;
            max-width: 430px;
            background: #fff;
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        /* ===== 顶部导航 ===== */
        .top-nav {
            height: 50px;
            background: #fff;
            display: flex;
            align-items: center;
            padding: 0 16px;
            border-bottom: 1px solid #f0f0f0;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .back-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: #f5f5f5;
            font-size: 18px;
            color: #666;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .back-btn:active { background: #e8e8e8; }
        .top-nav-title {
            flex: 1;
            text-align: center;
            font-size: 17px;
            font-weight: 600;
            color: #333;
            padding-right: 32px;
        }

        /* ===== 作品总数提示 ===== */
        .count-tip {
            padding: 14px 16px 4px;
            font-size: 13px;
            color: #999;
        }
        .count-tip strong {
            color: #0669FF;
        }

        /* ===== AI作品区块 ===== */
        .works-section {
            padding: 0 16px 20px;
        }
        .works-section:last-of-type {
            padding-bottom: 0;
        }
        .ws-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 16px 0 10px;
        }
        .ws-header .ws-icon {
            width: 26px;
            height: 26px;
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #fff;
        }
        .ws-header .ws-icon.purple { background: #8B5CF6; }
        .ws-header .ws-icon.orange { background: #F59E0B; }
        .ws-header h3 {
            font-size: 15px;
            font-weight: 600;
            color: #333;
        }
        .ws-header .ws-count {
            font-size: 11px;
            color: #999;
            font-weight: 400;
            margin-left: auto;
        }

        /* ===== 横向滑动列表 ===== */
        .scroll-row {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 4px;
        }
        .scroll-row::-webkit-scrollbar {
            height: 3px;
        }
        .scroll-row::-webkit-scrollbar-track {
            background: #f0f0f0;
            border-radius: 2px;
        }
        .scroll-row::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 2px;
        }
        .scroll-item {
            flex: 0 0 calc((100% - 20px) / 3);
            min-width: calc((100% - 20px) / 3);
            scroll-snap-align: start;
            text-align: center;
        }
        .img-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 4 / 3;
            border-radius: 10px;
            overflow: hidden;
            background: #f0f0f0;
            margin-bottom: 6px;
        }
        .img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .play-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(0,0,0,0.55);
            border: 2px solid rgba(255,255,255,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #fff;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .play-btn:active {
            transform: translate(-50%, -50%) scale(0.9);
        }
        .del-btn {
            position: absolute;
            top: 4px;
            right: 4px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: none;
            background: rgba(0,0,0,0.5);
            color: #fff;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .del-btn:active {
            background: rgba(200,50,50,0.8);
        }
        .scroll-item .item-label {
            font-size: 12px;
            color: #333;
            font-weight: 500;
            line-height: 1.3;
        }

        /* ===== 底部留白 ===== */
        .bottom-spacer {
            height: 30px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- 顶部导航 -->
    <div class="top-nav">
        <button class="back-btn" onclick="goBack()">‹</button>
        <div class="top-nav-title">查看作品</div>
    </div>

    <!-- 总数提示 -->
    <div class="count-tip">共 <strong>3</strong> 个AI作品</div>

    <!-- ===== AI创作视频 ===== -->
    <div class="works-section">
        <div class="ws-header">
            <div class="ws-icon purple">🎬</div>
            <h3>AI创作视频</h3>
            <span class="ws-count">共2个</span>
        </div>
        <div class="scroll-row">
            <div class="scroll-item">
                <div class="img-wrap">
                    <img src="杜甫的家" alt="杜甫的家">
                    <div class="play-btn">▶</div>
                    <button class="del-btn" onclick="showDelTip(this)">✕</button>
                </div>
                <div class="item-label">杜甫的家</div>
            </div>
            <div class="scroll-item">
                <div class="img-wrap">
                    <img src="杜甫和李白.png" alt="杜甫和李白">
                    <div class="play-btn">▶</div>
                    <button class="del-btn" onclick="showDelTip(this)">✕</button>
                </div>
                <div class="item-label">杜甫和李白</div>
            </div>
        </div>
    </div>

    <!-- ===== AI创作游戏 ===== -->
    <div class="works-section">
        <div class="ws-header">
            <div class="ws-icon orange">🎮</div>
            <h3>AI创作游戏</h3>
            <span class="ws-count">共1个</span>
        </div>
        <div class="scroll-row">
            <div class="scroll-item" onclick="goGame()" style="cursor:pointer;">
                <div class="img-wrap">
                    <img src="快速搭建茅屋" alt="快速搭建茅屋">
                    <div class="play-btn">▶</div>
                    <button class="del-btn" onclick="event.stopPropagation();showDelTip(this)">✕</button>
                </div>
                <div class="item-label">快速搭建茅屋</div>
            </div>
        </div>
    </div>

    <div class="bottom-spacer"></div>
</div>

<script>
    function goBack() {
        window.location.href = '研学手记.html';
    }

    function goGame() {
        window.location.href = '搭建小茅屋.html';
    }

    function showDelTip(btn) {
        var label = btn.parentElement.parentElement.querySelector('.item-label');
        var name = label ? label.textContent : '该作品';
        if (confirm('确定要删除"' + name + '"吗？删除后无法恢复。')) {
            var item = btn.closest('.scroll-item');
            item.style.transition = 'opacity 0.3s, transform 0.3s';
            item.style.opacity = '0';
            item.style.transform = 'scale(0.8)';
            setTimeout(function() {
                item.remove();
                // 更新数量
                updateCounts();
            }, 300);
        }
    }

    function updateCounts() {
        var sections = document.querySelectorAll('.works-section');
        sections.forEach(function(section) {
            var items = section.querySelectorAll('.scroll-item');
            var countEl = section.querySelector('.ws-count');
            if (countEl) {
                countEl.textContent = '共' + items.length + '个';
            }
        });
        var total = document.querySelectorAll('.scroll-item').length;
        var tip = document.querySelector('.count-tip strong');
        if (tip) tip.textContent = total;
    }
</script>

</body>
</html>
