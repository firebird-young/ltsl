<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>研学评价</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
            background: #f5f7fa;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .app-container {
            width: 100%; max-width: 430px;
            background: #fff; min-height: 100vh;
            position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        .top-nav {
            height: 50px; background: #fff;
            display: flex; align-items: center;
            padding: 0 16px;
            border-bottom: 1px solid #f0f0f0;
            position: sticky; top: 0; z-index: 50;
        }
        .back-btn {
            width: 32px; height: 32px; border-radius: 50%; border: none;
            background: #f5f5f5; font-size: 18px; color: #666;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .top-nav-title { flex: 1; text-align: center; font-size: 17px; font-weight: 600; color: #333; padding-right: 32px; }

        .course-bar {
            padding: 14px 16px; background: linear-gradient(135deg, #E8C87A, #D4A84B);
            display: flex; align-items: center; gap: 10px;
        }
        .course-bar .cb-icon { font-size: 20px; }
        .course-bar .cb-info { flex: 1; }
        .course-bar .cb-info .cb-name { font-size: 15px; font-weight: 600; color: #5C3D1A; }
        .course-bar .cb-info .cb-sub { font-size: 12px; color: rgba(92,61,26,0.7); margin-top: 2px; }

        .user-badge {
            padding: 12px 16px; display: flex; align-items: center; gap: 10px;
            border-bottom: 1px solid #f5f5f5;
        }
        .user-badge .ub-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background: #0669FF; display: flex; align-items: center; justify-content: center;
            font-size: 18px; color: #fff;
        }
        .user-badge .ub-name { font-size: 15px; font-weight: 600; color: #333; }

        .tip-area { padding: 14px 16px 8px; }
        .tip-area .tip-title { font-size: 15px; font-weight: 600; color: #333; }
        .tip-area .tip-desc { font-size: 12px; color: #888; margin-top: 3px; }

        .eval-box { margin: 0 16px; }
        .eval-box textarea {
            width: 100%; padding: 14px;
            border: 1px solid #e0e0e0; border-radius: 12px;
            font-size: 14px; color: #333; resize: none;
            outline: none; font-family: inherit; line-height: 1.7;
            min-height: 100px; transition: border-color 0.2s;
        }
        .eval-box textarea:focus { border-color: #0669FF; }
        .eval-box textarea::placeholder { color: #bbb; }

        .quick-tags {
            display: flex; flex-wrap: wrap; gap: 8px;
            padding: 10px 16px 14px;
        }
        .quick-tag {
            padding: 6px 14px; border-radius: 20px;
            border: 1px solid #e0e0e0; background: #fff;
            font-size: 12px; color: #666; cursor: pointer;
            transition: all 0.2s;
        }
        .quick-tag:active { background: #E8F1FF; border-color: #0669FF; color: #0669FF; }

        .gen-btn-wrap { padding: 4px 16px 16px; }
        .gen-btn {
            width: 100%; padding: 13px; border: none; border-radius: 10px;
            background: #0669FF; color: #fff;
            font-size: 16px; font-weight: 600; cursor: pointer;
            transition: opacity 0.2s;
        }
        .gen-btn:active { opacity: 0.8; }
        .gen-btn:disabled { opacity: 0.5; cursor: default; }

        .progress-wrap {
            display: none; margin: 16px 16px 0;
            padding: 14px; background: #fff; border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .progress-wrap.show { display: block; }
        .progress-wrap .pb-text { font-size: 13px; color: #888; margin-bottom: 8px; text-align: center; }
        .progress-track { width: 100%; height: 6px; background: #f0f0f0; border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #0669FF, #4A9EFF); border-radius: 3px; transition: width 0.3s; }

        .result-area {
            display: none; margin: 16px 16px 0; flex-direction: column; gap: 12px;
        }
        .result-area.show { display: flex; }
        .result-card { background: #f8f9fc; border-radius: 14px; padding: 18px; }
        .result-card .rc-label { font-size: 13px; font-weight: 600; color: #0669FF; margin-bottom: 8px; }
        .result-card .rc-content {
            font-size: 14px; color: #444; line-height: 1.8; white-space: pre-wrap;
        }
        .result-card .rc-content[contenteditable="true"] {
            background: #fff; padding: 12px; border-radius: 8px;
            border: 1px solid #e0e0e0; outline: none;
        }
        .result-card .rc-content[contenteditable="true"]:focus { border-color: #0669FF; }

        .bottom-actions { padding: 12px 16px 30px; display: none; flex-direction: column; gap: 10px; }
        .bottom-actions.show { display: flex; }
        .save-btn {
            width: 100%; padding: 13px; border: none; border-radius: 10px;
            background: #D4A84B; color: #fff; font-size: 16px; font-weight: 600; cursor: pointer;
        }
        .save-btn:active { opacity: 0.8; }
        .regen-btn {
            width: 100%; padding: 12px; border: 1px solid #0669FF; border-radius: 10px;
            background: #fff; color: #0669FF; font-size: 15px; font-weight: 500; cursor: pointer;
            text-align: center;
        }
        .regen-btn:active { opacity: 0.8; }

        .bottom-spacer { height: 10px; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="top-nav">
            <button class="back-btn" onclick="goBack()">‹</button>
            <div class="top-nav-title">研学评价</div>
        </div>

        <div class="course-bar">
            <span class="cb-icon">🏚️</span>
            <div class="cb-info">
                <div class="cb-name" id="courseName">杜甫和李白的故事</div>
                <div class="cb-sub" id="courseTime">场次：13:00-15:00</div>
            </div>
        </div>

        <div class="user-badge">
            <div class="ub-avatar">👤</div>
            <div class="ub-name" id="userName">赵小明</div>
        </div>

        <div class="tip-area">
            <div class="tip-title">✍️ 输入评价内容</div>
            <div class="tip-desc">描述学员表现，或从下方快捷词中选择</div>
        </div>

        <div class="eval-box">
            <textarea id="evalInput" rows="4" placeholder="请输入评价内容，如：学员在搭建茅屋时非常专注..."></textarea>
        </div>

        <div class="quick-tags">
            <span class="quick-tag" onclick="addTag(this)">专注认真</span>
            <span class="quick-tag" onclick="addTag(this)">团队协作</span>
            <span class="quick-tag" onclick="addTag(this)">动手能力强</span>
            <span class="quick-tag" onclick="addTag(this)">知识理解深刻</span>
            <span class="quick-tag" onclick="addTag(this)">积极互动</span>
            <span class="quick-tag" onclick="addTag(this)">创新思维</span>
            <span class="quick-tag" onclick="addTag(this)">有待提升</span>
        </div>

        <div class="gen-btn-wrap">
            <button class="gen-btn" id="genBtn" onclick="startGenerate()">✨ 生成评价</button>
        </div>

        <div class="progress-wrap" id="progressWrap">
            <div class="pb-text" id="progressText">🤖 AI正在生成评价...</div>
            <div class="progress-track">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <div class="result-area" id="resultArea">
            <div class="result-card">
                <div class="rc-label">📄 评价内容（可点击修改）</div>
                <div class="rc-content" id="resultContent" contenteditable="true"></div>
            </div>
        </div>

        <div class="bottom-actions" id="bottomActions">
            <button class="save-btn" onclick="saveEval()">💾 保存评价</button>
            <button class="regen-btn" onclick="reGenerate()">🔄 再次生成</button>
        </div>

        <div class="bottom-spacer"></div>
    </div>

    <script>
        var genTimer = null;
        var params = new URLSearchParams(window.location.search);
        var userName = params.get('name') || '赵小明';
        var courseName = params.get('course') || '杜甫和李白的故事';
        var courseTime = params.get('time') || '13:00-15:00';
        var isView = params.get('view') === '1';
        var evalKey = 'eval_' + userName;

        document.getElementById('userName').textContent = userName;
        document.getElementById('courseName').textContent = courseName;
        document.getElementById('courseTime').textContent = '场次：' + courseTime;

        if (isView) {
            var saved = localStorage.getItem(evalKey);
            if (saved) {
                document.getElementById('resultContent').textContent = saved;
                document.getElementById('resultArea').classList.add('show');
                document.getElementById('bottomActions').classList.add('show');
            }
        }

        function goBack() {
            window.location.href = '订单详情.html';
        }

        function addTag(el) {
            var input = document.getElementById('evalInput');
            var text = el.textContent;
            var cur = input.value.trim();
            input.value = cur ? cur + '、' + text : text;
        }

        function startGenerate() {
            var btn = document.getElementById('genBtn');
            btn.disabled = true;
            btn.textContent = '⏳ 生成中...';

            document.getElementById('resultArea').classList.remove('show');
            document.getElementById('bottomActions').classList.remove('show');

            var wrap = document.getElementById('progressWrap');
            wrap.classList.add('show');
            var fill = document.getElementById('progressFill');
            fill.style.width = '0%';

            var p = 0;
            var interval = setInterval(function() {
                p += Math.random() * 15 + 5;
                if (p > 95) p = 95;
                fill.style.width = p + '%';
            }, 400);

            genTimer = setTimeout(function() {
                clearInterval(interval);
                fill.style.width = '100%';
                setTimeout(function() {
                    wrap.classList.remove('show');
                    btn.style.display = 'none';

                    var keywords = document.getElementById('evalInput').value.trim() || '课程表现';
                    var content = generateEval(keywords);
                    document.getElementById('resultContent').textContent = content;
                    document.getElementById('resultArea').classList.add('show');
                    document.getElementById('bottomActions').classList.add('show');
                    genTimer = null;
                }, 300);
            }, 2000);
        }

        function generateEval(keywords) {
            var kws = keywords.split(/[、，,]/).filter(function(k) { return k.trim(); });
            var content = '对 ' + userName + ' 在本次课程中的表现评价如下：\n\n';
            kws.forEach(function(k) {
                var kw = k.trim();
                if (kw.indexOf('专注') !== -1) content += '• ' + kw + '：在课程中始终保持高度专注，认真听讲并积极完成各项任务。\n';
                else if (kw.indexOf('团队') !== -1 || kw.indexOf('协作') !== -1) content += '• ' + kw + '：在分组活动中主动配合组员，具备良好的团队合作意识。\n';
                else if (kw.indexOf('动手') !== -1) content += '• ' + kw + '：在实践环节表现出色，能够独立完成搭建任务，操作熟练。\n';
                else if (kw.indexOf('知识') !== -1 || kw.indexOf('理解') !== -1) content += '• ' + kw + '：对课程所涉及的历史文化知识掌握良好，能够灵活运用。\n';
                else if (kw.indexOf('积极') !== -1 || kw.indexOf('互动') !== -1) content += '• ' + kw + '：课堂参与度高，积极回答问题和参与讨论。\n';
                else if (kw.indexOf('创新') !== -1 || kw.indexOf('思维') !== -1) content += '• ' + kw + '：在活动中展现了良好的创新意识，提出了有价值的想法。\n';
                else if (kw.indexOf('提升') !== -1) content += '• ' + kw + '：在某些环节还有进步空间，建议后续多加练习。\n';
                else content += '• ' + kw + '：在本次研学课程中表现良好，值得肯定。\n';
            });
            content += '\n总体评价：表现优异，望继续保持！';
            return content;
        }

        function saveEval() {
            var content = document.getElementById('resultContent').textContent;
            localStorage.setItem(evalKey, content);
            window.location.href = '订单详情.html';
        }

        function reGenerate() {
            document.getElementById('bottomActions').classList.remove('show');
            document.getElementById('resultArea').classList.remove('show');
            document.getElementById('genBtn').style.display = 'block';
            document.getElementById('genBtn').disabled = false;
            document.getElementById('genBtn').textContent = '✨ 生成评价';
            document.getElementById('progressWrap').classList.remove('show');
            if (genTimer) { clearTimeout(genTimer); genTimer = null; }
            // 模拟AI生成过程
            startGenerate();
        }
    </script>
<a href="AI创作和研学报告.html" style="position:fixed;top:12px;right:16px;z-index:99999;background:#E53935;color:#fff;padding:7px 16px;border-radius:20px;text-decoration:none;font-size:13px;font-weight:600;box-shadow:0 2px 10px rgba(229,57,53,0.4);display:inline-flex;align-items:center;gap:5px;">🏠 首页</a>
</body>
</html>
