<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分销管理 - 管理后台</title>
    <style>
        :root {
            --bg: #ffffff;
            --accent: #0066cc;
            --accent-hover: #0071e3;
            --link: #0071e3;
            --ink: #1d1d1f;
            --ink-muted: #3f424b;
            --ink-subtle: #86868b;
            --border: #e0e0e0;
            --card-bg: #ffffff;
            --radius-sm: 9999px;
            --radius-card: 18px;
            --radius-pill: 9999px;
            --radius-tag: 6px;
            --shadow-card: 0 0 0 1px rgba(0,0,0,0.06);
            --font: 'SF Pro Text', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font);
            background: #f5f5f7;
            min-height: 100vh;
            color: var(--ink);
            -webkit-font-smoothing: antialiased;
        }

        .header {
            background: #fff;
            height: 56px;
            display: flex;
            align-items: center;
            padding: 0 24px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header .logo { font-size: 18px; font-weight: 700; color: var(--accent); margin-right: 32px; }
        .header .nav-list { display: flex; gap: 24px; list-style: none; }
        .header .nav-list li { font-size: 14px; color: var(--ink-subtle); cursor: pointer; padding: 4px 0; position: relative; }
        .header .nav-list li:hover { color: var(--accent); }
        .header .nav-list li.active { color: var(--accent); font-weight: 600; }
        .header .nav-list li.active::after { content: ''; position: absolute; bottom: -4px; left: 0; right: 0; height: 2px; background: var(--accent); border-radius: 1px; }
        .header .user-area { margin-left: auto; display: flex; align-items: center; gap: 16px; }
        .header .user-area .avatar { width: 32px; height: 32px; border-radius: 50%; background: #E8F0FE; display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--accent); }
        .header .user-area .name { font-size: 14px; color: var(--ink); }

        .breadcrumb { padding: 16px 24px 0; font-size: 13px; color: var(--ink-subtle); }
        .breadcrumb a { color: var(--ink-subtle); text-decoration: none; }
        .breadcrumb a:hover { color: var(--accent); }
        .breadcrumb .current { color: var(--ink); font-weight: 500; }

        .main { padding: 16px 24px 40px; }

        /* 统计卡片 */
        .stat-row { display: flex; gap: 16px; margin-bottom: 24px; }
        .stat-card {
            flex: 1; background: #fff; border-radius: var(--radius-card); padding: 18px 20px;
            box-shadow: var(--shadow-card);
        }
        .stat-card .sc-label { font-size: 13px; color: var(--ink-subtle); font-weight: 400; }
        .stat-card .sc-value { font-size: 24px; font-weight: 700; color: var(--ink); margin-top: 4px; }
        .stat-card .sc-value.blue { color: var(--accent); }
        .stat-card .sc-value.green { color: #34c759; }
        .stat-card .sc-value.orange { color: #ff9500; }

        /* Tab 切换 */
        .tab-bar { display: flex; gap: 0; margin-bottom: 16px; background: #fff; border-radius: var(--radius-pill); overflow: hidden; box-shadow: var(--shadow-card); padding: 4px; }
        .tab-bar .tab-item {
            flex: 1; padding: 12px 0; text-align: center; font-size: 14px; font-weight: 500;
            color: var(--ink-subtle); cursor: pointer; border-radius: var(--radius-pill); transition: all 0.2s;
        }
        .tab-bar .tab-item:hover { color: var(--accent); }
        .tab-bar .tab-item.active { background: var(--accent); color: #fff; font-weight: 600; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* 搜索/筛选栏 */
        .filter-bar {
            display: flex; gap: 12px; align-items: center; margin-bottom: 16px; flex-wrap: wrap;
        }
        .filter-bar .search-input {
            flex: 1; min-width: 200px; height: 38px; border: 1px solid var(--border); border-radius: var(--radius-pill);
            padding: 0 16px; font-size: 13px; outline: none; transition: border-color 0.2s; font-family: inherit;
        }
        .filter-bar .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(0,102,204,0.08); }
        .filter-bar select {
            height: 38px; border: 1px solid var(--border); border-radius: var(--radius-pill); padding: 0 14px;
            font-size: 13px; color: var(--ink); outline: none; background: #fff; font-family: inherit;
        }
        .filter-bar select:focus { border-color: var(--accent); }
        .filter-bar .btn {
            height: 38px; padding: 0 22px; border: none; border-radius: var(--radius-pill); font-size: 13px;
            font-weight: 500; cursor: pointer; transition: all 0.2s; font-family: inherit;
        }
        .filter-bar .btn.primary { background: var(--accent); color: #fff; }
        .filter-bar .btn.primary:hover { background: var(--accent-hover); }

        /* 表格 */
        .table-wrap {
            background: #fff; border-radius: var(--radius-card); overflow: hidden; box-shadow: var(--shadow-card);
        }
        table { width: 100%; border-collapse: collapse; }
        thead th {
            font-size: 12px; font-weight: 600; color: var(--ink-subtle); text-align: left;
            padding: 14px 16px; border-bottom: 1px solid var(--border); background: #fafafc;
        }
        tbody td {
            font-size: 13px; color: var(--ink); padding: 14px 16px; border-bottom: 1px solid #f5f5f5;
        }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover { background: #FAFBFF; }

        .tag {
            display: inline-block; padding: 3px 12px; border-radius: var(--radius-tag); font-size: 11px; font-weight: 500;
        }
        .tag.green { background: #E8F5E9; color: #34c759; }
        .tag.orange { background: #FFF3E0; color: #ff9500; }
        .tag.blue { background: #E8F0FE; color: var(--accent); }
        .tag.red { background: #FFF0F0; color: #ff3b30; }
        .tag.gray { background: #f5f5f7; color: var(--ink-subtle); }

        /* 操作按钮 */
        .action-btn {
            padding: 5px 14px; border: none; border-radius: var(--radius-pill); font-size: 12px; font-weight: 500;
            cursor: pointer; transition: all 0.2s; margin: 0 3px;
        }
        .action-btn:active { opacity: 0.8; }
        .action-btn.green { background: #E8F5E9; color: #34c759; }
        .action-btn.blue { background: #E8F0FE; color: var(--accent); }
        .action-btn.red { background: #FFF0F0; color: #ff3b30; }
        .action-btn.gray { background: #f5f5f7; color: var(--ink-subtle); cursor: default; }

        /* 月份分组 */
        .wd-group { background: #fff; border-radius: var(--radius-card); margin-bottom: 16px; box-shadow: var(--shadow-card); overflow: hidden; }
        .wd-group .wdg-header { padding: 14px 20px; background: #fafafc; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .wd-group .wdg-header .wdg-month { font-size: 14px; font-weight: 600; color: var(--ink); }
        .wd-group .wdg-header .wdg-summary { font-size: 12px; color: var(--ink-subtle); }
        .wd-group .wdg-header .wdg-summary strong { color: var(--ink); }
        .wd-group .wdg-header .wdg-summary .red { color: #ff3b30; }
        .wd-group .wdg-item { display: flex; align-items: center; padding: 14px 20px; border-bottom: 1px solid #f5f5f5; }
        .wd-group .wdg-item:last-child { border-bottom: none; }
        .wd-group .wdg-item .wdg-info { flex: 2; min-width: 0; }
        .wd-group .wdg-item .wdg-info .wdg-name { font-size: 14px; font-weight: 500; color: var(--ink); }
        .wd-group .wdg-item .wdg-info .wdg-name a { color: var(--accent); text-decoration: none; }
        .wd-group .wdg-item .wdg-info .wdg-name a:hover { text-decoration: underline; }
        .wd-group .wdg-item .wdg-info .wdg-phone { font-size: 11px; color: var(--ink-subtle); font-family: monospace; margin-top: 1px; }
        .wd-group .wdg-item .wdg-amount { flex: 1; font-size: 16px; font-weight: 700; color: var(--ink); text-align: center; }
        .wd-group .wdg-item .wdg-meta { flex: 1.5; font-size: 12px; color: var(--ink-subtle); text-align: center; }
        .wd-group .wdg-item .wdg-meta .wdg-acct { margin-bottom: 2px; }
        .wd-group .wdg-item .wdg-status { flex: 0.8; text-align: center; }
        .wd-group .wdg-item .wdg-action { flex: 1; text-align: center; }
        .wd-group .wdg-item .wdg-action .btn-retry {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 6px 16px; border-radius: var(--radius-pill); border: none; cursor: pointer;
            font-size: 12px; font-weight: 500; transition: all 0.2s; font-family: inherit;
            background: var(--accent); color: #fff;
        }
        .wd-group .wdg-item .wdg-action .btn-retry:hover { background: var(--accent-hover); }
        .wd-group .wdg-item .wdg-action .btn-retry:active { opacity: 0.8; }

        /* 分页 */
        .pagination { display: flex; justify-content: center; gap: 6px; margin-top: 20px; }
        .pagination .page-btn {
            width: 34px; height: 34px; border: 1px solid var(--border); border-radius: var(--radius-pill);
            display: flex; align-items: center; justify-content: center; font-size: 13px;
            color: var(--ink-subtle); cursor: pointer; background: #fff; transition: all 0.2s;
        }
        .pagination .page-btn:hover { border-color: var(--accent); color: var(--accent); }
        .pagination .page-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
        .pagination .page-btn.disabled { opacity: 0.4; cursor: default; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">离泰研学</div>
    <ul class="nav-list">
        <li onclick="location.href='系统参数配置.html'">系统参数</li>
        <li onclick="location.href='研学报告管理.html'">报告管理</li>
        <li class="active">分销管理</li>
        <li onclick="location.href='分销员管理.html'">分销员管理</li>
        <li onclick="location.href='拼团订单管理.html'">拼团订单</li>
        <li onclick="location.href='课程管理.html'">课程管理</li>
    </ul>
    <div class="user-area">
        <span class="name">管理员</span>
        <div class="avatar">👤</div>
    </div>
</div>

<div class="breadcrumb">离泰研学 / 分销管理</div>

<div class="main">

    <!-- 统计卡片 -->
    <div class="stat-row">
        <div class="stat-card">
            <div class="sc-label">分销员总数</div>
            <div class="sc-value blue">128</div>
        </div>
        <div class="stat-card">
            <div class="sc-label">本月新增分销员</div>
            <div class="sc-value green">12</div>
        </div>
        <div class="stat-card">
            <div class="sc-label">本月佣金支出</div>
            <div class="sc-value orange">¥8,620.50</div>
        </div>
        <div class="stat-card">
            <div class="sc-label">待结算佣金</div>
            <div class="sc-value">¥1,720.00</div>
        </div>
    </div>

    <!-- Tab 切换 -->
    <div class="tab-bar">
        <div class="tab-item active" onclick="switchTab(this, 'orders')">分销订单</div>
        <div class="tab-item" onclick="switchTab(this, 'withdraw')">提现管理</div>
    </div>

    <!-- ============ TAB 1: 分销订单 ============ -->
    <div class="tab-panel active" id="panel-orders">
        <div class="filter-bar">
            <input class="search-input" id="orderSearch" placeholder="搜索订单名称、分销员姓名、手机号..." oninput="filterOrders()">
            <select id="orderStatusFilter" onchange="filterOrders()">
                <option value="all">全部状态</option>
                <option value="done">已结算</option>
                <option value="pending">待结算</option>
                <option value="refund">已退款</option>
            </select>
            <button class="btn primary" onclick="alert('导出成功')">导出</button>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>订单编号</th>
                        <th>订单名称</th>
                        <th>订单金额</th>
                        <th>分享员</th>
                        <th>分享员账号</th>
                        <th>分佣比例</th>
                        <th>佣金</th>
                        <th>下单时间</th>
                        <th>结算时间</th>
                        <th>状态</th>
                    </tr>
                </thead>
                <tbody id="orderTableBody">
                </tbody>
            </table>
        </div>
        <div class="pagination" id="orderPagination"></div>
    </div>

    <!-- ============ TAB 2: 提现管理 ============ -->
    <div class="tab-panel" id="panel-withdraw">
        <div class="filter-bar">
            <input class="search-input" id="withdrawSearch" placeholder="搜索分销员姓名、手机号..." oninput="filterWithdraws()">
            <select id="withdrawMonthFilter" onchange="filterWithdraws()">
                <option value="all">全部月份</option>
            </select>
            <select id="withdrawStatusFilter" onchange="filterWithdraws()">
                <option value="all">全部状态</option>
                <option value="pending">待提现</option>
                <option value="success">提现成功</option>
                <option value="failed">提现失败</option>
            </select>
        </div>
        <div id="withdrawList"></div>
        <div class="pagination" id="withdrawPagination"></div>
    </div>
</div>

<script>
    /* ===== 模拟数据 ===== */
    var orderData = [
        { id: 'YX20260602001', name: '盆景美学·指尖山水', amount: 373.33, phone: '13812345678', distributor: '王小明', rate: '15%', commission: 56.00, time: '2026-06-02 10:30', settleTime: '2026-06-02 23:00', status: 'done' },
        { id: 'YX20260601002', name: '诗界无心·草堂寻心', amount: 200.00, phone: '13812345678', distributor: '王小明', rate: '15%', commission: 30.00, time: '2026-06-01 14:20', settleTime: '2026-06-01 23:00', status: 'done' },
        { id: 'YX20260530003', name: '搭建小茅屋', amount: 150.00, phone: '18698765432', distributor: '李大力', rate: '15%', commission: 22.50, time: '2026-05-30 09:15', settleTime: null, status: 'pending' },
        { id: 'YX20260522004', name: '自然探索营', amount: 298.00, phone: '18698765432', distributor: '李大力', rate: '15%', commission: 44.70, time: '2026-05-22 08:30', settleTime: '2026-05-22 23:00', status: 'done' },
        { id: 'YX20260520005', name: '我为杜甫建茅屋', amount: 586.67, phone: '13655667788', distributor: '张小红', rate: '15%', commission: 88.00, time: '2026-05-20 16:00', settleTime: '2026-05-20 23:00', status: 'done' },
        { id: 'YX20260518006', name: '盆景美学·指尖山水', amount: 373.33, phone: '15099887766', distributor: '赵思远', rate: '15%', commission: 56.00, time: '2026-05-18 11:20', settleTime: null, status: 'refund' },
        { id: 'YX20260515007', name: '诗界无心·草堂寻心', amount: 200.00, phone: '17712340987', distributor: '刘佳', rate: '15%', commission: 30.00, time: '2026-05-15 09:00', settleTime: '2026-05-15 23:00', status: 'done' },
        { id: 'YX20260512008', name: '搭建小茅屋', amount: 150.00, phone: '18856781234', distributor: '陈伟', rate: '15%', commission: 22.50, time: '2026-05-12 14:30', settleTime: null, status: 'pending' },
    ];

    var withdrawData = [
        { month: '2026年6月', name: '王小明', phone: '13812345678', amount: 1560.00, account: '微信零钱', time: '2026-06-01', status: 'pending' },
        { month: '2026年5月', name: '李大力', phone: '18698765432', amount: 2300.00, account: '微信零钱', time: '2026-05-31', status: 'success' },
        { month: '2026年5月', name: '张小红', phone: '13655667788', amount: 880.00, account: '微信零钱', time: '2026-05-31', status: 'pending' },
        { month: '2026年5月', name: '赵思远', phone: '15099887766', amount: 500.00, account: '微信零钱', time: '', status: 'failed' },
        { month: '2026年5月', name: '刘佳', phone: '17712340987', amount: 1200.00, account: '微信零钱', time: '2026-05-31', status: 'success' },
        { month: '2026年5月', name: '陈伟', phone: '18856781234', amount: 3200.00, account: '微信零钱', time: '', status: 'failed' },
        { month: '2026年4月', name: '王小明', phone: '13812345678', amount: 1640.00, account: '微信零钱', time: '2026-04-30', status: 'success' },
        { month: '2026年4月', name: '李大力', phone: '18698765432', amount: 1400.00, account: '微信零钱', time: '2026-04-30', status: 'success' },
        { month: '2026年4月', name: '刘佳', phone: '17712340987', amount: 800.00, account: '微信零钱', time: '', status: 'failed' },
    ];
    var statusLabels = { pending: '待提现', success: '提现成功', failed: '提现失败' };

    var orderPage = 1, orderPageSize = 6;
    var withdrawPage = 1, withdrawPageSize = 6;

    /* ===== Tab 切换 ===== */
    function switchTab(el, name) {
        document.querySelectorAll('.tab-item').forEach(function(t) { t.classList.remove('active'); });
        document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
        el.classList.add('active');
        document.getElementById('panel-' + name).classList.add('active');
    }

    /* ===== 状态标签 ===== */
    function statusTag(status) {
        var map = { done: ['green', '已结算'], pending: ['orange', '待结算'], refund: ['red', '已退款'] };
        var m = map[status] || ['gray', status];
        return '<span class="tag ' + m[0] + '">' + m[1] + '</span>';
    }
    function wdStatusTag(status) {
        var map = { pending: ['orange', '待提现'], success: ['green', '提现成功'], failed: ['red', '提现失败'] };
        var m = map[status] || ['gray', status];
        return '<span class="tag ' + m[0] + '">' + m[1] + '</span>';
    }

    /* ===== 分销订单 ===== */
    function filterOrders() {
        orderPage = 1;
        renderOrders();
    }
    function renderOrders() {
        var keyword = document.getElementById('orderSearch').value.trim().toLowerCase();
        var statusFilter = document.getElementById('orderStatusFilter').value;
        var filtered = orderData.filter(function(o) {
            var matchStatus = statusFilter === 'all' || o.status === statusFilter;
            var matchKw = keyword === '' || o.name.toLowerCase().indexOf(keyword) !== -1
                        || o.distributor.indexOf(keyword) !== -1
                        || o.phone.indexOf(keyword) !== -1
                        || o.id.toLowerCase().indexOf(keyword) !== -1;
            return matchStatus && matchKw;
        });
        var totalPages = Math.ceil(filtered.length / orderPageSize) || 1;
        var start = (orderPage - 1) * orderPageSize;
        var pageData = filtered.slice(start, start + orderPageSize);
        var html = '';
        pageData.forEach(function(o) {
            html += '<tr><td style="font-size:12px;color:var(--ink-subtle);">' + o.id + '</td>'
                 + '<td>' + o.name + '</td>'
                 + '<td>¥' + o.amount.toFixed(2) + '</td>'
                 + '<td><a href="分销员详情.html?name=' + encodeURIComponent(o.distributor) + '&phone=' + o.phone + '" style="color:var(--accent);text-decoration:none;font-weight:500;">' + o.distributor + '</a></td>'
                 + '<td style="font-family:monospace;">' + o.phone + '</td>'
                 + '<td>' + o.rate + '</td>'
                 + '<td><b>¥' + o.commission.toFixed(2) + '</b></td>'
                 + '<td style="font-size:12px;color:var(--ink-subtle);">' + o.time + '</td>'
                 + '<td style="font-size:12px;color:var(--ink-subtle);">' + (o.settleTime || '-') + '</td>'
                 + '<td>' + statusTag(o.status) + '</td></tr>';
        });
        if (!html) html = '<tr><td colspan="10" style="text-align:center;color:var(--ink-subtle);padding:40px;">暂无数据</td></tr>';
        document.getElementById('orderTableBody').innerHTML = html;
        renderPagination('orderPagination', totalPages, orderPage, goOrderPage);
    }

    /* ===== 获取所有月份（去重排序） ===== */
    function getAllMonths() {
        var map = {};
        withdrawData.forEach(function(w) { map[w.month] = true; });
        return Object.keys(map).sort().reverse();
    }
    function initMonthFilter() {
        var sel = document.getElementById('withdrawMonthFilter');
        getAllMonths().forEach(function(m) {
            var opt = document.createElement('option');
            opt.value = m; opt.textContent = m;
            sel.appendChild(opt);
        });
    }

    /* ===== 提现管理 ===== */
    function filterWithdraws() {
        renderWithdraws();
    }
    function renderWithdraws() {
        var keyword = document.getElementById('withdrawSearch').value.trim().toLowerCase();
        var monthFilter = document.getElementById('withdrawMonthFilter').value;
        var statusFilter = document.getElementById('withdrawStatusFilter').value;
        var filterFn = function(w) {
            var matchMonth = monthFilter === 'all' || w.month === monthFilter;
            var matchStatus = statusFilter === 'all' || w.status === statusFilter;
            var matchKw = keyword === '' || w.name.indexOf(keyword) !== -1 || w.phone.indexOf(keyword) !== -1;
            return matchMonth && matchStatus && matchKw;
        };

        var groups = {};
        withdrawData.forEach(function(w) {
            if (!filterFn(w)) return;
            if (!groups[w.month]) groups[w.month] = [];
            groups[w.month].push(w);
        });

        var months = Object.keys(groups).sort().reverse();
        var html = '';
        months.forEach(function(month) {
            var items = groups[month];
            var total = items.reduce(function(s, w) { return s + w.amount; }, 0);
            var successCount = items.filter(function(w) { return w.status === 'success'; }).length;
            var failCount = items.filter(function(w) { return w.status === 'failed'; }).length;
            var pendingCount = items.filter(function(w) { return w.status === 'pending'; }).length;

            var summaryParts = [];
            summaryParts.push('总额 <strong>¥' + total.toFixed(2) + '</strong>');
            if (successCount) summaryParts.push('成功 <strong>' + successCount + '</strong> 笔');
            if (pendingCount) summaryParts.push('待提现 <strong class="red">' + pendingCount + '</strong> 笔');
            if (failCount) summaryParts.push('失败 <strong class="red">' + failCount + '</strong> 笔');

            html += '<div class="wd-group">'
                 + '<div class="wdg-header">'
                 + '<span class="wdg-month">' + month + '</span>'
                 + '<span class="wdg-summary">' + summaryParts.join(' · ') + '</span>'
                 + '</div>';

            items.forEach(function(w) {
                html += '<div class="wdg-item">'
                     + '<div class="wdg-info">'
                     + '<div class="wdg-name"><a href="分销员详情.html?name=' + encodeURIComponent(w.name) + '&phone=' + w.phone + '">' + w.name + '</a></div>'
                     + '<div class="wdg-phone">' + w.phone + '</div>'
                     + '</div>'
                     + '<div class="wdg-amount">¥' + w.amount.toFixed(2) + '</div>'
                     + '<div class="wdg-meta">'
                     + '<div class="wdg-acct">' + w.account + '</div>'
                     + '<div>' + (w.time || '<span style="color:#ccc;">-</span>') + '</div>'
                     + '</div>'
                     + '<div class="wdg-status">' + wdStatusTag(w.status) + '</div>'
                     + '<div class="wdg-action">' + (w.status === 'failed' ? '<button class="btn-retry" onclick="retryWithdraw(' + withdrawData.indexOf(w) + ')">↻ 重新打款</button>' : '') + '</div>'
                     + '</div>';
            });

            html += '</div>';
        });

        if (!html) html = '<div style="text-align:center;color:var(--ink-subtle);padding:60px 0;">暂无数据</div>';
        document.getElementById('withdrawList').innerHTML = html;
        document.getElementById('withdrawPagination').innerHTML = '';
    }

    function retryWithdraw(idx) {
        if (confirm('确认重新打款给该分销员？')) {
            withdrawData[idx].status = 'pending';
            withdrawData[idx].time = '';
            renderWithdraws();
        }
    }

    /* ===== 分页 ===== */
    function goOrderPage(p) { orderPage = p; renderOrders(); }
    function goWithdrawPage(p) { withdrawPage = p; renderWithdraws(); }
    function renderPagination(containerId, total, current, pageFn) {
        var html = '';
        var fnName = pageFn.name;
        html += current > 1 ? '<div class="page-btn" onclick="' + fnName + '(' + (current-1) + ')">‹</div>' : '<div class="page-btn disabled">‹</div>';
        for (var i = 1; i <= total; i++) {
            html += '<div class="page-btn' + (i === current ? ' active' : '') + '" onclick="' + fnName + '(' + i + ')">' + i + '</div>';
        }
        html += current < total ? '<div class="page-btn" onclick="' + fnName + '(' + (current+1) + ')">›</div>' : '<div class="page-btn disabled">›</div>';
        document.getElementById(containerId).innerHTML = html;
    }

    /* ===== 初始化 ===== */
    initMonthFilter();
    renderOrders();
    renderWithdraws();
</script>
