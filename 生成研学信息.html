<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>生成研学信息</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
            background: #f5f7fa;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .app-container {
            width: 100%; max-width: 430px;
            background: #fff; min-height: 100vh;
            position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }
        .top-nav {
            height: 50px; background: #fff;
            display: flex; align-items: center;
            padding: 0 16px;
            border-bottom: 1px solid #f0f0f0;
        }
        .back-btn {
            width: 32px; height: 32px; border-radius: 50%; border: none;
            background: #f5f5f5; font-size: 18px; color: #666;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .top-nav-title { flex: 1; text-align: center; font-size: 17px; font-weight: 600; color: #333; padding-right: 32px; }

        .course-bar {
            padding: 14px 16px; background: linear-gradient(135deg, #E8C87A, #D4A84B);
            display: flex; align-items: center; gap: 10px;
        }
        .course-bar .cb-icon { font-size: 20px; }
        .course-bar .cb-text { font-size: 14px; font-weight: 600; color: #5C3D1A; }

        .tip-area { padding: 16px 16px 0; }
        .tip-area .tip-title { font-size: 15px; font-weight: 600; color: #333; }
        .tip-area .tip-desc { font-size: 12px; color: #888; margin-top: 3px; }

        .input-group { margin: 10px 16px 0; }
        .input-group label {
            font-size: 13px; font-weight: 500; color: #666;
            display: block; margin-bottom: 6px;
        }
        .input-group input, .input-group textarea {
            width: 100%; padding: 12px 14px;
            border: 1px solid #e0e0e0; border-radius: 10px;
            font-size: 14px; color: #333; outline: none;
            font-family: inherit; transition: border-color 0.2s;
        }
        .input-group input:focus, .input-group textarea:focus { border-color: #0669FF; }
        .input-group input::placeholder, .input-group textarea::placeholder { color: #bbb; }
        .input-group textarea { resize: none; line-height: 1.6; min-height: 80px; }

        .quick-tags {
            display: flex; flex-wrap: wrap; gap: 8px;
            padding: 10px 16px 14px;
        }
        .quick-tag {
            padding: 6px 14px; border-radius: 20px;
            border: 1px solid #e0e0e0; background: #fff;
            font-size: 12px; color: #666; cursor: pointer;
            transition: all 0.2s;
        }
        .quick-tag:active { background: #E8F1FF; border-color: #0669FF; color: #0669FF; }

        .gen-btn-wrap { padding: 4px 16px 16px; }
        .gen-btn {
            width: 100%; padding: 13px; border: none; border-radius: 10px;
            background: #0669FF; color: #fff;
            font-size: 16px; font-weight: 600; cursor: pointer;
            transition: opacity 0.2s;
        }
        .gen-btn:active { opacity: 0.8; }
        .gen-btn:disabled { opacity: 0.5; cursor: default; }

        .progress-wrap {
            display: none; margin: 16px 16px 0;
            padding: 14px; background: #fff; border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .progress-wrap.show { display: block; }
        .progress-wrap .pb-text { font-size: 13px; color: #888; margin-bottom: 8px; text-align: center; }
        .progress-track { width: 100%; height: 6px; background: #f0f0f0; border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #0669FF, #4A9EFF); border-radius: 3px; transition: width 0.3s; }

        .result-area {
            display: none; margin: 16px 16px 0; flex-direction: column; gap: 12px;
        }
        .result-area.show { display: flex; }
        .result-card { background: #f8f9fc; border-radius: 14px; padding: 18px; }
        .result-card .rc-label { font-size: 13px; font-weight: 600; color: #0669FF; margin-bottom: 8px; }
        .result-card .rc-content {
            font-size: 14px; color: #444; line-height: 1.8; white-space: pre-wrap;
        }
        .result-card .rc-content[contenteditable="true"] {
            background: #fff; padding: 12px; border-radius: 8px;
            border: 1px solid #e0e0e0; outline: none;
        }
        .result-card .rc-content[contenteditable="true"]:focus { border-color: #0669FF; }

        .bottom-actions { padding: 12px 16px 30px; display: none; flex-direction: column; gap: 10px; }
        .bottom-actions.show { display: flex; }
        .save-btn {
            width: 100%; padding: 13px; border: none; border-radius: 10px;
            background: #D4A84B; color: #fff; font-size: 16px; font-weight: 600; cursor: pointer;
        }
        .save-btn:active { opacity: 0.8; }
        .regen-btn {
            width: 100%; padding: 12px; border: 1px solid #0669FF; border-radius: 10px;
            background: #fff; color: #0669FF; font-size: 15px; font-weight: 500; cursor: pointer;
        }
        .regen-btn:active { opacity: 0.8; }

        .bottom-spacer { height: 10px; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="top-nav">
            <button class="back-btn" onclick="goBack()">‹</button>
            <div class="top-nav-title" id="pageTitle">生成研学信息</div>
        </div>

        <div class="course-bar">
            <span class="cb-icon">🏚️</span>
            <span class="cb-text">我为杜甫建茅屋</span>
        </div>

        <div class="tip-area">
            <div class="tip-title">📝 填写研学信息</div>
            <div class="tip-desc">输入研学时长和关键词，AI自动生成研学信息</div>
        </div>

        <!-- 研学时长 -->
        <div class="input-group">
            <label>⏱️ 研学时长</label>
            <input type="text" id="durationInput" placeholder="如：2小时、半天、全天..." maxlength="20">
        </div>

        <!-- 关键词 -->
        <div class="input-group" style="margin-top:14px;">
            <label>📌 研学内容关键词</label>
            <textarea id="keywordInput" rows="3" placeholder="请输入关键词，如：茅屋搭建、团队协作、历史文化..."></textarea>
        </div>

        <div class="quick-tags">
            <span class="quick-tag" onclick="addTag(this)">茅屋搭建</span>
            <span class="quick-tag" onclick="addTag(this)">团队协作</span>
            <span class="quick-tag" onclick="addTag(this)">历史文化</span>
            <span class="quick-tag" onclick="addTag(this)">动手实践</span>
            <span class="quick-tag" onclick="addTag(this)">知识收获</span>
            <span class="quick-tag" onclick="addTag(this)">创新思维</span>
        </div>

        <div class="gen-btn-wrap">
            <button class="gen-btn" id="genBtn" onclick="startGenerate()">✨ 立即生成</button>
        </div>

        <div class="progress-wrap" id="progressWrap">
            <div class="pb-text" id="progressText">🤖 AI正在生成研学信息...</div>
            <div class="progress-track">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <div class="result-area" id="resultArea">
            <div class="result-card">
                <div class="rc-label">📄 研学信息内容（可点击修改）</div>
                <div class="rc-content" id="resultContent" contenteditable="true"></div>
            </div>
        </div>

        <div class="bottom-actions" id="bottomActions">
            <button class="save-btn" onclick="saveInfo()">💾 保存信息</button>
            <button class="regen-btn" onclick="reGenerate()">🔄 重新生成</button>
        </div>

        <div class="bottom-spacer"></div>
    </div>

    <script>
        var genTimer = null;
        var infoKey = 'studyInfo';
        var isView = new URLSearchParams(window.location.search).get('view') === '1';

        if (isView) {
            var saved = localStorage.getItem(infoKey);
            if (saved) {
                try {
                    var data = JSON.parse(saved);
                    document.getElementById('durationInput').value = data.duration || '';
                    document.getElementById('resultContent').textContent = data.content || '';
                } catch(e) {
                    document.getElementById('resultContent').textContent = saved;
                }
                document.getElementById('resultArea').classList.add('show');
                document.getElementById('bottomActions').classList.add('show');
                document.getElementById('genBtn').style.display = 'none';
            }
        }

        function goBack() {
            window.location.href = '订单详情.html';
        }

        function addTag(el) {
            var input = document.getElementById('keywordInput');
            var text = el.textContent;
            var cur = input.value.trim();
            input.value = cur ? cur + '、' + text : text;
        }

        function startGenerate() {
            var btn = document.getElementById('genBtn');
            btn.disabled = true;
            btn.textContent = '⏳ 生成中...';

            document.getElementById('resultArea').classList.remove('show');
            document.getElementById('bottomActions').classList.remove('show');

            doGenerate();
        }

        function generateInfo(duration, keywords) {
            var kws = keywords.split(/[、，,]/).filter(function(k) { return k.trim(); });
            var content = '【研学信息】\n\n';
            content += '📋 课程名称：我为杜甫建茅屋\n';
            content += '⏱️ 研学时长：' + duration + '\n';
            content += '📅 课程时间：2026年5月28日 14:00-17:00\n\n';
            content += '━━━ 研学内容 ━━━\n\n';
            content += '本次课程以杜甫草堂为背景，通过探访诗圣故居、学习传统茅屋搭建技艺，';
            content += '让学生深入了解唐代建筑文化与杜甫的家国情怀。\n';
            kws.forEach(function(k) {
                var kw = k.trim();
                if (kw.indexOf('茅屋') !== -1) content += '▸ ' + kw + '：学习了传统茅屋的搭建结构、材料选择及力学原理，分组协作亲手搭建茅屋模型。\n';
                else if (kw.indexOf('团队') !== -1) content += '▸ ' + kw + '：分组协作完成搭建任务，成员分工明确，配合默契。\n';
                else if (kw.indexOf('历史') !== -1 || kw.indexOf('文化') !== -1) content += '▸ ' + kw + '：深入了解唐代建筑风格与杜甫诗歌的深厚文化底蕴。\n';
                else if (kw.indexOf('动手') !== -1 || kw.indexOf('实践') !== -1) content += '▸ ' + kw + '：在搭建过程中反复调整结构，锻炼实际操作能力。\n';
                else if (kw.indexOf('知识') !== -1 || kw.indexOf('收获') !== -1) content += '▸ ' + kw + '：了解杜甫在成都的生活与创作背景，感受诗圣家国情怀。\n';
                else if (kw.indexOf('创新') !== -1 || kw.indexOf('思维') !== -1) content += '▸ ' + kw + '：在传统茅屋结构基础上思考优化设计，培养创新意识。\n';
                else content += '▸ ' + kw + '：作为本次研学的重要环节，深入参与并获得了丰富体验。\n';
            });
            return content;
        }

        function saveInfo() {
            var duration = document.getElementById('durationInput').value.trim();
            var content = document.getElementById('resultContent').textContent;
            var data = JSON.stringify({ duration: duration, content: content });
            localStorage.setItem(infoKey, data);
            window.location.href = '订单详情.html';
        }

        function reGenerate() {
            document.getElementById('bottomActions').classList.remove('show');
            document.getElementById('resultArea').classList.remove('show');
            document.getElementById('progressWrap').classList.remove('show');
            if (genTimer) { clearTimeout(genTimer); genTimer = null; }
            // 直接模拟AI生成
            doGenerate();
        }

        function doGenerate() {
            var wrap = document.getElementById('progressWrap');
            wrap.classList.add('show');
            var fill = document.getElementById('progressFill');
            fill.style.width = '0%';

            var p = 0;
            var interval = setInterval(function() {
                p += Math.random() * 15 + 5;
                if (p > 95) p = 95;
                fill.style.width = p + '%';
            }, 400);

            genTimer = setTimeout(function() {
                clearInterval(interval);
                fill.style.width = '100%';
                setTimeout(function() {
                    wrap.classList.remove('show');

                    var duration = document.getElementById('durationInput').value.trim() || '未填写';
                    var keywords = document.getElementById('keywordInput').value.trim() || '课程学习';
                    var content = generateInfo(duration, keywords);
                    document.getElementById('resultContent').textContent = content;
                    document.getElementById('resultArea').classList.add('show');
                    document.getElementById('bottomActions').classList.add('show');
                    document.getElementById('genBtn').style.display = 'none';
                    genTimer = null;
                }, 300);
            }, 2000);
        }
    </script>
</body>
</html>
