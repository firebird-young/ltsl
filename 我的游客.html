<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的游客</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .app-container {
            width: 100%;
            max-width: 430px;
            background: #f5f5f5;
            min-height: 100vh;
            position: relative;
            padding-bottom: 20px;
        }

        /* ===== 顶部导航 ===== */
        .top-nav {
            height: 50px;
            background: #fff;
            display: flex;
            align-items: center;
            padding: 0 16px;
            border-bottom: 1px solid #f0f0f0;
        }
        .back-btn {
            width: 32px; height: 32px;
            border-radius: 50%; border: none;
            background: #f5f5f5;
            font-size: 18px; color: #666;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .top-nav-title {
            flex: 1;
            text-align: center;
            font-size: 17px; font-weight: 600; color: #333;
            padding-right: 32px;
        }

        /* ===== 游客列表 ===== */
        .visitor-list {
            padding: 12px 16px;
        }
        .visitor-item {
            background: #FFFBF5;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .visitor-item:last-child {
            margin-bottom: 0;
        }
        .visitor-info {
            flex: 1;
        }
        .visitor-name {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
        }
        .visitor-id {
            font-size: 13px;
            color: #666;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .visitor-id .label {
            color: #999;
        }
        .track-btn {
            padding: 8px 14px;
            border: none;
            border-radius: 8px;
            background: #E65100;
            color: #fff;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            flex-shrink: 0;
            transition: opacity 0.2s;
        }
        .track-btn:active {
            opacity: 0.85;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 顶部导航 -->
        <div class="top-nav">
            <button class="back-btn" onclick="goBack()">‹</button>
            <div class="top-nav-title">我的游客</div>
        </div>

        <!-- 游客列表 -->
        <div class="visitor-list">
            <div class="visitor-item">
                <div class="visitor-info">
                    <div class="visitor-name">杨梅</div>
                    <div class="visitor-id">
                        <span class="label">身份证</span>
                        <span>511602198505080038</span>
                    </div>
                </div>
                <button class="track-btn" onclick="viewTrack('杨梅')">查看研学足迹</button>
            </div>
            <div class="visitor-item">
                <div class="visitor-info">
                    <div class="visitor-name">刘飞</div>
                    <div class="visitor-id">
                        <span class="label">身份证</span>
                        <span>51162119891027672X</span>
                    </div>
                </div>
                <button class="track-btn" onclick="viewTrack('刘飞')">查看研学足迹</button>
            </div>
            <div class="visitor-item">
                <div class="visitor-info">
                    <div class="visitor-name">小朋友</div>
                    <div class="visitor-id">
                        <span class="label">身份证</span>
                        <span>32010220160827491X</span>
                    </div>
                </div>
                <button class="track-btn" onclick="viewTrack('小朋友')">查看研学足迹</button>
            </div>
        </div>
    </div>

    <script>
        function goBack() {
            window.location.href = '我的.html';
        }

        function viewTrack(name) {
            window.location.href = '研学足迹.html?name=' + encodeURIComponent(name);
        }
    </script>
</body>
</html>
